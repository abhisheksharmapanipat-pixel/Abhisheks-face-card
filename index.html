<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhishek Sharma | Luxury Card</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:#fff;
    overflow-x:hidden;
}

/* HERO */
.hero{
    height:100vh;
    background:url('https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:3rem;
    letter-spacing:2px;
    animation:fadeIn 2s ease;
}

.hero p{
    margin-top:10px;
    opacity:0.7;
}

/* GLASS CARD */
.card{
    width:300px;
    height:400px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:20px;
    margin:40px auto;
    text-align:center;
    transition:0.4s;
    transform-style:preserve-3d;
}

.card:hover{
    transform:rotateY(15deg) rotateX(10deg) scale(1.05);
    box-shadow:0 0 40px rgba(255,255,255,0.2);
}

.card img{
    width:100%;
    border-radius:15px;
}

/* GALLERY GRID */
.<div class="slideshow">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg" class="slide active">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg" class="slide">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg" class="slide">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg" class="slide">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg" class="slide">
</div>
/* FLOATING EFFECT */
.float{
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-20px)}
}

/* FORM */
.contact{
    padding:50px;
    text-align:center;
}

input, textarea{
    width:90%;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 30px;
    border:none;
    background:#ff0066;
    color:#fff;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff3399;
    transform:scale(1.1);
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(50px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>ABHISHEK SHARMA</h1>
        <p>Ultra Luxury Digital Personality Card</p>
    </div>
</section>

<!-- CARD -->
<div class="card float">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <h2>Abhishek</h2>
    <p>Web Developer | Digital Creator</p>
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
    <img src="https://i.ibb.co/Z6J0LWYJ/IMG-3403.jpg">
</div>

<!-- CONTACT FORM -->
<section class="contact">
    <h2>Affiliate / Contact</h2>
    <form onsubmit="sendToInsta(event)">
        <input type="text" id="name" placeholder="Your Name" required><br>
        <input type="email" id="email" placeholder="Your Email" required><br>
        <textarea id="msg" placeholder="Your Message"></textarea><br>
        <button type="submit">Send</button>
    </form>
</section>

<script>
function sendToInsta(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let msg = document.getElementById("msg").value;

    let text = `New Affiliate Lead:\nName: ${name}\nEmail: ${email}\nMessage: ${msg}`;

    // Instagram redirect (fallback)
    window.open("https://www.instagram.com/abhishek_sharma_panipat", "_blank");

    // Optional WhatsApp backup
    window.open("https://wa.me/9050953173?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
